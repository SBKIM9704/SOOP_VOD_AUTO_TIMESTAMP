name: youtube

# 검증이 끝난 VOD 하나의 노래 구간을 합본 영상으로 만들어 유튜브에 **unlisted** 업로드한다.
# 올린 뒤 코드가 영상을 고치거나 지우는 경로는 없다(수정·삭제 API 미구현) — 손볼 일은 스튜디오에서.
#
# daily.yml과 완전히 분리돼 있다: 별도 concurrency 그룹이라 서로 막지 않고, 쓰는 DB 컬럼도
# 겹치지 않는다(vods.youtube_*). daily는 여전히 미디어를 만지지 않는다 — ffmpeg/yt-dlp가
# 필요한 건 이 워크플로뿐이다.
on:
  schedule:
    # 하루 1회. 계정 정지(2026-07-18) 이후의 원칙 — 업로드 케이던스를 사람처럼 낮게 유지한다.
    # 쿼터(1건 1600 units / 일 10,000)보다 이 이유가 크다.
    - cron: "0 16 * * *"   # 16:00 UTC = 01:00 KST
  workflow_dispatch:
    inputs:
      title_no:
        description: "특정 VOD 지정 (비우면 가장 최신 대상 자동 선택)"
        required: false
        type: string
      dry_run:
        description: "영상·제목·설명만 만들고 업로드하지 않음"
        required: false
        default: false
        type: boolean

concurrency:
  group: soopts-youtube     # daily(soopts-daily)와 분리 — 동시에 돌아도 상호 차단 없음
  cancel-in-progress: false

jobs:
  youtube:
    runs-on: ubuntu-latest
    # 최악 케이스(30곡·109분 1080p): 슬라이스 다운로드 + x264 재인코딩 + 업로드. 실측 기준
    # 7분짜리가 2분이었으니 109분이면 수십 분대이고, 여유를 크게 잡았다.
    timeout-minutes: 240
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: ffmpeg + 한글 폰트
        # 배포판 ffmpeg를 쓴다 — 일부 static 빌드는 --enable-libfreetype 표기와 달리 drawtext가
        # 빠져 있어 곡 제목 오버레이가 통째로 실패한다(로컬에서 실제로 겪음).
        # fonts-nanum이 없으면 한글이 두부(□□□)로 렌더된다.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-nanum

      - name: Install soopts (batch + youtube)
        run: pip install -e ".[batch,youtube]" yt-dlp

      - name: 유튜브 OAuth 자격 복원
        # 러너는 브라우저 동의를 할 수 없으므로 토큰 파일이 반드시 있어야 한다.
        # 토큰은 로컬에서 `python scripts/mint_token.py`로 만들어 시크릿에 올린다.
        run: |
          set -euo pipefail
          printf '%s' "$YT_CLIENT_SECRET" > client_secret.json
          mkdir -p ~/.config/soopts
          printf '%s' "$YT_TOKEN" > ~/.config/soopts/yt_token.json
          chmod 600 client_secret.json ~/.config/soopts/yt_token.json
        env:
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}

      - name: 랜덤 딜레이
        # 매일 정확히 같은 분에 올라가는 패턴을 피한다(봇 케이던스 회피).
        # 수동 실행(workflow_dispatch)에서는 건너뛴다 — 테스트를 30분 기다릴 이유가 없다.
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 1200 + 600))   # 10~30분

      - name: soopts youtube-upload
        id: upload
        continue-on-error: true
        # 작업 파일은 $RUNNER_TEMP에 만든다(레포 체크아웃을 수 GB로 더럽히지 않는다).
        # 실측: 합본이 약 2Mbps로 나와 최장 109분 VOD가 클립 1.7GB + 합본 1.7GB ≈ 피크 3.3GB.
        # 원본 슬라이스는 컷 직후 지우므로 곡 하나분(≤0.36GB)만 순간 점유한다.
        # `set -o pipefail`이 없으면 tee가 항상 0을 돌려줘 크래시가 통째로 묻힌다(이 레포에서 한 번 겪음).
        run: |
          set -o pipefail
          ARGS=()
          if [ -n "${{ inputs.title_no }}" ]; then ARGS+=(--title-no "${{ inputs.title_no }}"); fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS+=(--dry-run); fi
          soopts -v --work-root "$RUNNER_TEMP/soopts-ytbuild" youtube-upload "${ARGS[@]}" 2>&1 \
            | tee youtube.log

      - name: 요약
        if: always()
        run: |
          {
            echo "## soopts youtube-upload 결과 (${{ steps.upload.outcome }})"
            echo ""
            echo '```'
            tail -n 25 youtube.log 2>/dev/null || echo "(로그 없음)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 자격 파일 정리
        if: always()
        run: rm -f client_secret.json ~/.config/soopts/yt_token.json

      - name: 실패 판정
        if: steps.upload.outcome == 'failure'
        run: exit 1
