name: sync

# 검수 확정(confirmed)된 곡명을 유튜브 제목/설명에 반영 + 유튜브 영상 삭제 큐 소진.
# audio/stt 등 무거운 의존성 불필요.
on:
  # 2026-07-18 일시 중단: 업로드 대상 Google 계정(SBKIM9704) 전체 정지 — 이의신청 결과가
  # 나올 때까지 무인 실행을 막는다. 계정 복구 후 아래 schedule/workflow_run 주석을 되돌릴 것.
  # schedule:
  #   - cron: "0 20 * * *"   # 20:00 UTC = 05:00 KST — daily가 그날 아예 안 돈 경우(처리할 VOD
  #                           # 없음 등) 대비 안전망. daily는 몇 시간씩 걸릴 수 있어 고정 오프셋
  #                           # 만으로는 "daily 이후"를 보장 못 한다 — 아래 workflow_run이 실제 트리거.
  workflow_dispatch: {}
  # workflow_run:
  #   workflows: ["daily"]   # daily.yml의 name: daily 참조 — daily가 끝나는 즉시(성공/실패 무관) 실행
  #   types: [completed]

concurrency:
  group: soopts-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install soopts (+youtube,batch)
        run: pip install -e ".[youtube,batch]"

      - name: 유튜브 OAuth 자격 복원
        run: |
          echo "$YT_CLIENT_SECRET" > client_secret.json
          mkdir -p ~/.config/soopts
          echo "$YT_TOKEN" > ~/.config/soopts/yt_token.json
        env:
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}

      - name: soopts sync
        id: sync
        continue-on-error: true
        run: |
          set -o pipefail
          soopts -v sync 2>&1 | tee sync.log

      - name: 요약
        if: always()
        run: |
          {
            echo "## soopts sync 결과 (${{ steps.sync.outcome }})"
            echo ""
            echo '```'
            tail -n 20 sync.log 2>/dev/null || echo "(로그 없음)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 실패 판정
        if: steps.sync.outcome == 'failure'
        run: exit 1
