name: daily

# 스테이션 최신 VOD 무인 배치: 감지·식별 → 노래 구간(타임스탬프) DB 기록.
# 휘발성 러너 전제 — 상태의 진실은 Supabase(DB)에 있고, 받아둔 구간 파일은 재생성 가능하다.
# 산출물은 타임스탬프이며 영상은 만들지도 업로드하지도 않는다(시청은 SOOP 원본 딥링크).
on:
  schedule:
    - cron: "0 19 * * *"   # 19:00 UTC = 04:00 KST
  workflow_dispatch:
    inputs:
      count:
        description: "처리할 미처리 VOD 수 (기본: soopts.toml [station] daily_vod_count)"
        required: false
        type: string

concurrency:
  group: soopts-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest   # Phase 0 검증 실패 시 self-hosted로 교체 (나머지는 동일)
    timeout-minutes: 120   # 재인코딩 제거 후 VOD 1개 ≈ 20분 — 넉넉한 행 감지용 상한
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache 음악감지 모델
        uses: actions/cache@v4
        with:
          path: ~/.keras/inaSpeechSegmenter
          key: soopts-models-${{ runner.os }}-v1

      - name: Install soopts (+audio,stt,batch)
        run: pip install -e ".[audio,stt,batch]" yt-dlp

      - name: soopts daily
        id: daily
        continue-on-error: true
        run: |
          set -o pipefail
          ARGS=()
          if [ -n "${{ inputs.count }}" ]; then ARGS+=(--count "${{ inputs.count }}"); fi
          soopts -v daily "${ARGS[@]}" 2>&1 | tee daily.log

      - name: 요약
        if: always()
        run: |
          {
            echo "## soopts daily 결과 (${{ steps.daily.outcome }})"
            echo ""
            echo '```'
            tail -n 20 daily.log 2>/dev/null || echo "(로그 없음)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 실패 판정
        if: steps.daily.outcome == 'failure'
        run: exit 1
