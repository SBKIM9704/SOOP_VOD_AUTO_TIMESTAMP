# soopts 설정 예시 (노래 전용). 모든 키 생략 가능(생략 시 기본값).
# SOOP API는 비공식이라 언제든 바뀔 수 있으므로 엔드포인트를 여기서 패치한다.

[endpoints]
meta_url = "https://api.m.sooplive.com/station/video/a/view"
chat_url = "https://videoimg.sooplive.com/php/ChatLoadSplit.php"
api_level = 10

[collector]
request_delay_s = 0.3      # 요청 간 지연(서버 예의)
chunk_step_s = 300         # ChatLoadSplit startTime 증가 단위(초)

[audio]                    # 노래 구간 감지 (inaSpeechSegmenter)
vad_engine = "smn"         # speech/music/noise 분류
min_music_s = 30.0         # 이보다 짧은 음악 구간 제거(BGM 오탐)
merge_gap_s = 15.0         # 인접 음악 구간 병합 간격
skip_opening_s = 240.0     # 방송 초반(인사 스티커 폭증)은 노래에서 제외
sticker_rate_strong = 2.5  # 분당 스티커 이 이상이면 "노래 유력"(떼창곡)
min_sticker_rate = 0.0     # >0이면 스티커 적은 구간(BGM) 제거. 0=유지+주석만
# --slice 후보 탐지: 2분 이동윈도우 안 스티커 min개 이상이면 노래 후보(얕은 지속 반응도 포착)
sticker_window_buckets = 4   # 4×30초 = 2분 윈도우
sticker_min_per_window = 4   # 낮출수록 조용한 곡까지 잡음(후보↑·다운로드↑, STT필터가 정리)
sticker_pad_before_s = 90.0  # 스티커는 노래보다 늦게 터지므로 앞을 당겨 노래 시작을 덮음

[stt]                      # 가사 전사 (Groq Whisper API — GROQ_API_KEY 필요)
groq_model = "whisper-large-v3-turbo"
# language = "en"          # 노래 언어 강제 시 정확도 큼 (미지정=자동, en/ko 둘 다 시도)
lyric_chars = 300          # 출력 가사 길이 컷

[clip]                     # 노래 구간 감지 (soopts clips)
# 영상은 만들지 않는다. 받은 구간은 경계 탐지와 가사 전사의 입력으로만 쓰이고 둘 다
# 오디오만 보므로, 오디오가 동일한 최저 rendition으로 받아 다운로드를 8배 줄인다.
quality = "hls-hd"         # 540p. 오디오는 hls-original과 동일한 AAC
dl_pad_before_s = 120.0    # 경계 탐지 여유 위해 후보 구간 넉넉히 받음
dl_pad_after_s = 90.0
min_song_s = 45.0          # 구간 내 최장 음악 블록이 이보다 짧으면 노래 아님(스킵)

[youtube]                  # 노래모음 업로드 (soopts youtube-upload)
# unlisted(일부 공개)로 한 번에 올린다 — 링크를 아는 사람만 보고 검색·추천에는 안 뜬다.
# 2026-07-18 계정 정지 이후의 원칙으로 유튜브 API는 업로드 하나만 쓴다: 조회(videos.list)·
# 수정(videos.update)·삭제(videos.delete)는 구현 자체가 없다. 올린 뒤 손볼 일이 있으면
# 사람이 스튜디오에서 한다(완전 공개 전환도 마찬가지).
client_secret = "client_secret.json"          # Google Cloud OAuth 클라이언트(사용자 준비)
token_file = "~/.config/soopts/yt_token.json" # 최초 동의 후 토큰 저장(이후 자동 갱신)
privacy = "unlisted"       # 링크로만 시청 가능
daily_upload_limit = 1     # 하루 1건. 쿼터(1600/10000)보다 "봇 같은 케이던스 회피"가 이유다
# 치환자: {date}(방송일) {n}(곡 수) / 1곡일 때만 {title} {artist}
title_template = "{date} 노래 모음 ({n}곡)"
title_template_single = "{date} {title} - {artist}"

[video]                    # 합본 영상 빌드 (export/video.py)
# 모든 클립을 같은 파라미터로 재인코딩한다 — concat을 -c copy로 붙이려면 필수이고,
# 곡 제목 오버레이 때문에 어차피 인코딩을 피할 수 없다.
quality = "hls-original"   # 1920x1080 8Mbps (yt-dlp -F 실측). 없으면 fallback으로 재시도
fallback_quality = "hls-hd4k"  # 1280x720 4Mbps
preset = "veryfast"        # 러너 2코어로 100분짜리를 timeout 안에 끝내려면 이 이상 못 올린다
# 좌상단 오버레이: 제목(굵게)·아티스트(작게) 리본 2줄 + 왼쪽 액센트 바. 리본 폭은 글자에
# 맞춰 자동으로 늘어난다(고정 폭 패널은 긴 곡 제목이 삐져나온다). 러너: apt fonts-nanum
font_file = "/usr/share/fonts/truetype/nanum/NanumSquareR.ttf"
font_file_bold = "/usr/share/fonts/truetype/nanum/NanumSquareB.ttf"
title_overlay_font_size = 44
artist_overlay_font_size = 28
title_overlay_opacity = 0.6   # 리본 배경 검정 불투명도. 밝은 배경에서 글자가 묻히면 올린다
accent_color = "0xFFD24A@0.95"
max_songs = 40             # 러너 시간·디스크 안전판 (실측 최대 30곡/109분)
max_total_minutes = 150.0

[station]                  # 데일리 배치 대상 (soopts daily)
bj_id = "singgyul"
daily_vod_count = 1        # 한 런에서 처리할 미처리 VOD 수. 1개씩 처리해 런 소요시간을
                           # "가장 무거운 VOD 하나"로 고정한다 — 여러 개가 겹쳐 누적되지 않아
                           # 예측 가능하고, 런이 죽어도 1개만 영향받는다(실패 격리).
                           # 6시간마다 4슬롯/일이라 신규 유입(1~1.5개/일)을 충분히 커버하고
                           # 남는 슬롯이 백필을 소진한다. 백필이 다시 밀리면 이 값을 올리기보다
                           # cron 주기를 좁히는 쪽이 격리를 유지한다.
min_vod_age_days = 7       # 방송 후 이 일수 전까지는 서버가 손대지 않는다(0=끄기). 팬 타임라인이
                           # 아직 없거나 쓰이는 중인 VOD를 잡으면 되돌릴 수 없다 — 0개면 'manual'로
                           # 빠져 사람이 전체 전사로 풀어야 하고, 절반만 쓰인 걸 잡으면 그만큼만
                           # 기록하고 'analyzed'로 끝나 나머지를 조용히 잃는다(둘 다 자동 재처리 대상 아님).
                           # 쿨다운 중 슬롯은 백필이 채우므로 처리량 손해는 없다.
# 서버(daily)는 댓글 타임라인의 🎤 마커만 파싱해 DB에 기록한다(다운로드·STT·세그멘테이션 없음).
# 🎤가 없는 VOD(게임 방송·🎵 합방·옛 아이콘 없는 타임라인)는 'manual'로 표시하고, 사람이 로컬에서
# `scripts/analyze_vod.py`로 전체 전사해 솔로곡을 찾아 `soopts ingest`로 기록한다. 과거 처리분 검증은 vod-audit 스킬.
