# soopts 설정 예시 (노래 전용). 모든 키 생략 가능(생략 시 기본값).
# SOOP API는 비공식이라 언제든 바뀔 수 있으므로 엔드포인트를 여기서 패치한다.

[endpoints]
meta_url = "https://api.m.sooplive.com/station/video/a/view"
chat_url = "https://videoimg.sooplive.com/php/ChatLoadSplit.php"
api_level = 10

[collector]
request_delay_s = 0.3      # 요청 간 지연(서버 예의)
chunk_step_s = 300         # ChatLoadSplit startTime 증가 단위(초)

[audio]                    # 노래 구간 감지 (inaSpeechSegmenter)
vad_engine = "smn"         # speech/music/noise 분류
min_music_s = 30.0         # 이보다 짧은 음악 구간 제거(BGM 오탐)
merge_gap_s = 15.0         # 인접 음악 구간 병합 간격
skip_opening_s = 240.0     # 방송 초반(인사 스티커 폭증)은 노래에서 제외
sticker_rate_strong = 2.5  # 분당 스티커 이 이상이면 "노래 유력"(떼창곡)
min_sticker_rate = 0.0     # >0이면 스티커 적은 구간(BGM) 제거. 0=유지+주석만
# --slice 후보 탐지: 2분 이동윈도우 안 스티커 min개 이상이면 노래 후보(얕은 지속 반응도 포착)
sticker_window_buckets = 4   # 4×30초 = 2분 윈도우
sticker_min_per_window = 4   # 낮출수록 조용한 곡까지 잡음(후보↑·다운로드↑, STT필터가 정리)
sticker_pad_before_s = 90.0  # 스티커는 노래보다 늦게 터지므로 앞을 당겨 노래 시작을 덮음

[stt]                      # 가사 전사 (Groq Whisper API — GROQ_API_KEY 필요)
groq_model = "whisper-large-v3-turbo"
# language = "en"          # 노래 언어 강제 시 정확도 큼 (미지정=자동, en/ko 둘 다 시도)
lyric_chars = 300          # 출력 가사 길이 컷

[clip]                     # 노래 구간 감지 (soopts clips)
# 영상은 만들지 않는다. 받은 구간은 경계 탐지와 가사 전사의 입력으로만 쓰이고 둘 다
# 오디오만 보므로, 오디오가 동일한 최저 rendition으로 받아 다운로드를 8배 줄인다.
quality = "hls-hd"         # 540p. 오디오는 hls-original과 동일한 AAC
dl_pad_before_s = 120.0    # 경계 탐지 여유 위해 후보 구간 넉넉히 받음
dl_pad_after_s = 90.0
min_song_s = 45.0          # 구간 내 최장 음악 블록이 이보다 짧으면 노래 아님(스킵)

[station]                  # 데일리 배치 대상 (soopts daily)
bj_id = "singgyul"
daily_vod_count = 1        # 한 런에서 처리할 미처리 VOD 수. 1개씩 처리해 런 소요시간을
                           # "가장 무거운 VOD 하나"로 고정한다 — 여러 개가 겹쳐 누적되지 않아
                           # 예측 가능하고, 런이 죽어도 1개만 영향받는다(실패 격리).
                           # 6시간마다 4슬롯/일이라 신규 유입(1~1.5개/일)을 충분히 커버하고
                           # 남는 슬롯이 백필을 소진한다. 백필이 다시 밀리면 이 값을 올리기보다
                           # cron 주기를 좁히는 쪽이 격리를 유지한다.
sweep_limit = 1            # 한 런에서 실행할 신규 full_sweep(무-타임라인 전체 오디오 처리) 수.
                           # sweep은 전체 다운로드+전체 세그멘테이션이라 길어(9시간 VOD면
                           # 러너 타임아웃 위험) 몰림을 막는다. 초과분은 다음 런으로 미룸
                           # (재시도 sweep은 우선순위상 항상 실행). 늘리려면 daily.yml의
                           # timeout-minutes도 함께 올릴 것.
sweep_max_duration_s = 21600  # 이(6시간)보다 긴 무-타임라인 VOD는 sweep을 시도조차 않고
                           # 즉시 실패 처리 — 어떤 timeout에도 못 끝나 3번 헛도는 대신 몇 초 만에
                           # 사람에게 알린다. 이런 VOD는 timeout 없는 수동 CLI로 처리. 0=가드 끔.
